  import { getDatabase } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  import { ref, set, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYIR5kb031D1PQbCQF9UWoQKQyu4MjEco",
    authDomain: "turf28-a10e1.firebaseapp.com",
    databaseURL: "https://turf28-a10e1-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "turf28-a10e1",
    storageBucket: "turf28-a10e1.firebasestorage.app",
    messagingSenderId: "521710398801",
    appId: "1:521710398801:web:435045df3e2da1925c3770"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  window.db = {
    ref: (path) => {
      const dbRef = ref(database, path);
      return {
        once: (event, cb) => get(dbRef).then(snap => cb(snap)).catch(e => console.warn(e)),
        on: (event, cb, errCb) => {
          const unsub = onValue(dbRef, cb, errCb || (e => console.warn(e)));
          window._fbUnsubs = window._fbUnsubs || [];
          window._fbUnsubs.push(unsub);
          return { off: unsub };
        },
        off: () => {},
        set: (val, cb) => set(dbRef, val).then(() => cb && cb(null)).catch(e => { if(cb) cb(e); }),
        push: (val, cb) => push(dbRef, val).then(() => cb && cb(null)).catch(e => { if(cb) cb(e); }),
        remove: (cb) => remove(dbRef).then(() => cb && cb(null)).catch(e => { if(cb) cb(e); }),
      };
    }
  };
  console.log("✅ Firebase initialized!");
</script>

const { useState, useEffect, useRef } = React;

const PHONE = "8552893927";

function formatDate(d) { return d.toISOString().split("T")[0]; }
function getToday() { return formatDate(new Date()); }
function isWeekend(ds) { const d = new Date(ds).getDay(); return d === 0 || d === 6; }
function getDayName(ds) {
  const d = new Date(ds);
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yyyy = d.getFullYear();
  const weekday = d.toLocaleDateString("en-IN", { weekday:"long" });
  return `${weekday}, ${dd}/${mm}/${yyyy}`;
}
function getSlotHour(s) {
  const m = s.match(/^(\d+):00\s(AM|PM)/);
  if (!m) return 5;
  let h = parseInt(m[1]);
  if (m[2]==="PM" && h!==12) h+=12;
  if (m[2]==="AM" && h===12) h=0;
  return h;
}
function getSlotPrice(slot, date) {
  const h = getSlotHour(slot);
  const weekend = isWeekend(date);
  return h < 17 ? (weekend ? 600 : 500) : (weekend ? 800 : 700);
}

const ALL_SLOTS = [];
for (let h = 5; h < 23; h++) {
  const p1 = h < 12 ? "AM" : "PM";
  const d1 = h <= 12 ? h : h - 12;
  const h2 = h + 1;
  const p2 = h2 <= 12 ? (h2 < 12 ? "AM" : "PM") : "PM";
  const d2 = h2 <= 12 ? h2 : h2 - 12;
  ALL_SLOTS.push(`${String(d1).padStart(2,"0")}:00 ${p1} – ${String(d2).padStart(2,"0")}:00 ${p2}`);
}

function getTotalAmount(b) {
  if (b.status === "Free (Coupon)") return 0;
  if (b.hours && b.slot && b.date) return getSlotPrice(b.slot, b.date) * b.hours;
  return b.amount || 0;
}

function getDuration(b) {
  if (b.hours) return b.hours + " hr" + (b.hours > 1 ? "s" : "");
  if (b.selectedSlots && b.selectedSlots.length) return b.selectedSlots.length + " hr" + (b.selectedSlots.length > 1 ? "s" : "");
  return "1 hr";
}

function getEndTime(b) {
  if (b.selectedSlots && b.selectedSlots.length > 0) {
    return b.selectedSlots[b.selectedSlots.length-1]?.split("–")[1]?.trim() || "";
  }
  return b.slot?.split("–")[1]?.trim() || "";
}

function getStartTime(b) { return b.slot?.split("–")[0]?.trim() || b.slot || ""; }

function getTotalRevenueDisplay(list) {
  return list.reduce((sum, b) => {
    if (b.hours && b.slot && b.date) return sum + getSlotPrice(b.slot, b.date) * b.hours;
    return sum + (Number(b.amount) || 0);
  }, 0);
}

function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState("");

  const [showPw, setShowPw] = useState(false);

      try {
        window.db.ref("appConfig").once("value", snap => {
          const cfg = snap.val() || {};
          setAppConfig(cfg);
        });
      } catch(e) {}
    }, 300);
    return () => clearTimeout(t);
  }, []);

  const handleLogin = () => {
    if (!appConfig) { setError(true); return; }
    setLoading(true);
    setTimeout(() => {
      const correctUser = "admin12";
      const correctPass = String(appConfig.adminPin || "").trim();
      if (username.trim() === correctUser && password.trim() === correctPass) {
        setError(false);
        onLogin(appConfig);

        setError(true);
        setPassword("");

            <div className="bb" style={{ fontSize:38, color:"#15803D", lineHeight:1 }}>TURF 28</div>
            <div style={{ fontSize:11, color:"#9CA3AF", letterSpacing:3, textTransform:"uppercase", marginTop:5 }}>Admin Portal · Vijayapura</div>

          <div style={{ marginBottom:26, position:"relative" }}>

            <div style={{ position:"relative" }}>
              <span style={{ position:"absolute", left:13, top:"50%", transform:"translateY(-50%)", fontSize:16, pointerEvents:"none" }}>🔑</span>

/* ─── ADMIN DASHBOARD ─── */
function AdminDashboard({ appConfig, onLogout }) {
  const [tab, setTab] = useState("bookings");
  const [history, setHistory] = useState([]);
  const [bookings, setBookings] = useState({});
  const [loading, setLoading] = useState(true);
  const [adminDate, setAdminDate] = useState(getToday());
  const [histFilter, setHistFilter] = useState("day");
  const [sportFilter, setSportFilter] = useState("all");
  const [expandedCard, setExpandedCard] = useState(null);
  const [statusMap, setStatusMap] = useState({});
  const [searchQuery, setSearchQuery] = useState("");
  const [lastRefresh, setLastRefresh] = useState(new Date());

  useEffect(() => {
    setLoading(true);
    try {
      const bRef = window.db.ref("bookedSlots");
      bRef.on("value", snap => {
        setBookings(snap.val() || {});
        setLoading(false);
        setLastRefresh(new Date());
      });
      const hRef = window.db.ref("bookingHistory");
      hRef.on("value", snap => {
        const data = snap.val();
        if (data) {
          const arr = Array.isArray(data) ? data : Object.values(data);
          setHistory(arr);
        } else {
          setHistory([]);
        }
      });
    } catch(e) {
      console.warn("FB error:", e);
      setLoading(false);
    }
  }, []);

  const bookedFor = (sport, date) => {
    return (bookings[date]?.[sport]) || [];
  };

  const releaseSlot = (sport, date, slot) => {
    setBookings(prev => {
      const updated = JSON.parse(JSON.stringify(prev || {}));
      if (updated[date]) {
        ["cricket","football"].forEach(sp => {
          if (updated[date][sp]) updated[date][sp] = updated[date][sp].filter(s => s !== slot);
        });
      }
      return updated;
    });
    window.db.ref("bookedSlots").once("value", snap => {
      const current = snap.val() || {};
      if (!current[date]) current[date] = { cricket: [], football: [] };
      ["cricket","football"].forEach(sp => {
        if (current[date][sp]) current[date][sp] = current[date][sp].filter(s => s !== slot);
      });
      window.db.ref("bookedSlots").set(current);
    });
    window.db.ref("bookingHistory").once("value", snap => {
      const data = snap.val();
      if (!data) return;
      Object.entries(data).forEach(([key, val]) => {
        if (val.sport===sport && val.date===date && val.slot===slot) {
          window.db.ref("bookingHistory/"+key).remove();
        }
      });
    });
  };

  const updateBookingStatus = (bookedAt, newStatus) => {
    setStatusMap(prev => ({ ...prev, [bookedAt]: newStatus }));
    window.db.ref("bookingHistory").once("value", snap => {
      const data = snap.val();
      if (!data) return;
      Object.entries(data).forEach(([key, val]) => {
        if (val.bookedAt === bookedAt) {
          window.db.ref("bookingHistory/" + key + "/status").set(newStatus);
        }
      });
    });
  };

  const filterHistory = () => {
    const now = new Date();
    return history.filter(b => {
      const d = new Date(b.date);
      let passTime = true;
      if (histFilter==="day") passTime = b.date===getToday();
      else if (histFilter==="week") { const wa=new Date(now); wa.setDate(now.getDate()-7); passTime = d>=wa; }
      else if (histFilter==="month") passTime = d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      let passSport = sportFilter==="all" || b.sport===sportFilter;
      let passSearch = !searchQuery || b.name?.toLowerCase().includes(searchQuery.toLowerCase()) || b.phone?.includes(searchQuery);
      return passTime && passSport && passSearch;
    });
  };

  const filteredHistory = filterHistory();
  const cricketCount = filteredHistory.filter(b=>b.sport==="cricket").length;
  const footballCount = filteredHistory.filter(b=>b.sport==="football").length;
  const pendingCount = filteredHistory.filter(b=>(statusMap[b.bookedAt]||b.status)==="Pending Confirmation").length;

    <div style={{ minHeight:"100vh", background:"#f0fdf4" }}>

            <div>
              <div className="bb" style={{ fontSize:20, color:"#15803D", lineHeight:1 }}>TURF 28 ADMIN</div>
              <div style={{ fontSize:9, color:"#9CA3AF", letterSpacing:2, textTransform:"uppercase" }}>Management Portal</div>
            </div>
          </div>

          {/* Right side */}
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            {/* Live indicator */}
            <div style={{ display:"flex", alignItems:"center", gap:6, padding:"5px 13px", background:"rgba(21,128,61,0.08)", border:"1px solid rgba(21,128,61,0.2)", borderRadius:20 }}>

              <span style={{ fontSize:10, color:"#15803D", fontWeight:700, letterSpacing:1 }}>LIVE</span>
            </div>
            <a href="/" style={{ fontSize:12, color:"#6B7280", textDecoration:"none", fontWeight:600, padding:"7px 14px", border:"1.5px solid #D1FAE5", borderRadius:8, transition:"all .2s", display:"flex", alignItems:"center", gap:5 }}

              onMouseLeave={e=>{e.currentTarget.style.borderColor="#D1FAE5";e.currentTarget.style.color="#6B7280";e.currentTarget.style.background="transparent"}}>

                  </div>

                    { icon:"🏏", label:"Cricket", val:cricketCount, col:"#15803D", bg:"#F0FDF4", bdr:"#BBF7D0" },
                    { icon:"⚽", label:"Football", val:footballCount, col:"#7C3AED", bg:"rgba(124,58,237,0.05)", bdr:"rgba(124,58,237,0.18)" },
                    { icon:"⏳", label:"Pending", val:pendingCount, col:"#92400E", bg:"#FFFBEB", bdr:"#FDE68A" },

                {/* Booking Cards */}
                {filteredHistory.length===0 ? (

                            </div>
                          </div>

                          {/* Expanded Details */}
                          {isOpen && (

                              <div style={{ marginBottom:16 }}>

                                <div style={{ background:"#fff", borderRadius:11, border:"1px solid #E5E7EB", overflow:"hidden" }}>
                                  {[
                                    ["🏷️ Sport", b.sport==="cricket"?"🏏 Cricket Turf":"⚽ Football Turf"],
                                    ["📅 Date", getDayName(b.date)],
                                    ["⏰ Start Time", getStartTime(b)],
                                    ["⏱️ End Time", getEndTime(b)],
                                    ["⌛ Duration", getDuration(b)],
                                    ["💰 Amount", "₹"+totalAmt],
                                    ["👤 Name", b.name],
                                    ["📞 Phone", b.phone],
                                    ["👥 Players", b.players && b.players!=="-" ? b.players : "—"],
                                    ["🕐 Booked At", b.bookedAt || "—"],
                                    ["🆔 Payment ID", b.paymentId || "—"],
                                    ["📌 Status", status],
                                  ].map(([k,v])=>(
                                    <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"9px 14px", borderBottom:"1px solid #F9FAFB", gap:8 }}>
                                      <span style={{ fontSize:11, color:"#6B7280", fontWeight:600, flexShrink:0 }}>{k}</span>
                                      <span style={{ fontSize:11, color:"#111827", fontWeight:700, textAlign:"right", wordBreak:"break-all" }}>{v}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>

                              {/* Status Update */}
                              <div style={{ marginBottom:14 }}>
                                <div className="bb" style={{ fontSize:10, color:"#9CA3AF", letterSpacing:2.5, marginBottom:9 }}>UPDATE STATUS</div>
                                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                                  {["Confirmed","Pending Confirmation","Completed","Cancelled"].map(s=>(
                                    <button key={s} onClick={()=>updateBookingStatus(b.bookedAt, s)}
                                      style={{ padding:"7px 13px", borderRadius:8, border:"1.5px solid", fontSize:11, fontWeight:700, cursor:"pointer", transition:"all .15s",
                                        borderColor:status===s?(statusColors[s]?.border||"#BBF7D0"):"#E5E7EB",
                                        background:status===s?(statusColors[s]?.bg||"#F9FAFB"):"#fff",
                                        color:status===s?(statusColors[s]?.text||"#111827"):"#9CA3AF" }}>
                                      {s==="Confirmed"?"✅ Confirmed":s==="Pending Confirmation"?"⏳ Pending":s==="Completed"?"🏁 Completed":"❌ Cancelled"}
                                    </button>
                                  ))}
                                </div>
                              </div>

                              {/* Action Buttons */}
                              <div style={{ display:"flex", gap:8 }}>
                                <a href={"https://wa.me/91"+b.phone} target="_blank" rel="noopener noreferrer"

                                  <WA_ICON/> WhatsApp
                                </a>
                                <a href={"tel:+91"+b.phone}
                                  style={{ flex:1, padding:"10px", background:"#3b82f6", color:"#fff", border:"none", borderRadius:9, cursor:"pointer", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", gap:5, textDecoration:"none" }}>
                                  <CALL_ICON/> Call
                                </a>
                                <button onClick={()=>{ if(window.confirm("Are you sure you want to release this slot?")) { releaseSlot(b.sport,b.date,b.slot); setExpandedCard(null); }}}
                                  style={{ flex:1, padding:"10px", background:"#FEF2F2", color:"#DC2626", border:"1px solid #FECACA", borderRadius:9, cursor:"pointer", fontSize:12, fontWeight:700 }}>
                                  🗑️ Release Slot
                                </button>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {/* ── SLOTS TAB ── */}
            {tab==="slots" && (
              <div className="fadeIn">
                <div style={{ marginBottom:18 }}>
                  <label className="lbl">Select Date</label>
                  <div style={{ position:"relative", display:"inline-block" }}>
                    <div style={{ background:"#fff", border:"1.5px solid #BBF7D0", borderRadius:10, padding:"12px 18px", minWidth:190, display:"flex", alignItems:"center", gap:10, cursor:"pointer" }}>
                      <span style={{ fontSize:15, color:"#15803D", fontWeight:700, fontFamily:"monospace" }}>
                        {(()=>{ const [y,m,d]=adminDate.split("-"); return d+"/"+m+"/"+y; })()}
                      </span>
                      <span style={{ fontSize:18 }}>📅</span>
                    </div>
                    <input type="date" value={adminDate} onChange={e=>setAdminDate(e.target.value)}
                      style={{ position:"absolute", inset:0, opacity:0, cursor:"pointer", width:"100%", height:"100%" }}/>
                  </div>
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))", gap:20 }}>
                  {["cricket","football"].map(sport=>{
                    const blocked = bookedFor(sport, adminDate);
                    return (
                      <div key={sport} style={{ background:"#fff", border:"1.5px solid #BBF7D0", borderRadius:14, padding:"20px", boxShadow:"0 2px 10px rgba(0,0,0,0.04)" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                          <div className="bb" style={{ fontSize:20, color:sport==="cricket"?"#15803D":"#D97706" }}>
                            {sport==="cricket"?"🏏 Cricket":"⚽ Football"}

                          <span style={{ fontSize:12, padding:"4px 12px", borderRadius:20, background:"#FEF9C3", border:"1px solid #FDE047", color:"#854D0E", fontWeight:700 }}>

                        </div>

                        {blocked.length===0 ? (
                          <div style={{ fontSize:13, color:"#9CA3AF", padding:"20px", background:"#F9FAFB", borderRadius:10, textAlign:"center" }}>
                            <div style={{ fontSize:28, marginBottom:6 }}>✅</div>
                            No slots blocked for this date
                          </div>
                        ) : (
                          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                            {blocked.map(slot=>{
                              const bm = history.find(h=>h.sport===sport&&h.date===adminDate&&h.slot===slot);
                              return (
                                <div key={slot} style={{ background:"#FEF9C3", border:"1px solid #FDE68A", borderRadius:10, padding:"12px 14px" }}>
                                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                                    <div>
                                      <div style={{ fontSize:14, color:"#111827", fontWeight:700 }}>⏰ {slot}</div>
                                      <div style={{ fontSize:11, color:"#D97706", marginTop:2 }}>₹{getSlotPrice(slot,adminDate)}/hr</div>
                                      {bm && (
                                        <div style={{ fontSize:11, color:"#6B7280", marginTop:4 }}>
                                          👤 {bm.name} · 📞 {bm.phone}
                                        </div>
                                      )}
                                    </div>
                                    <button onClick={()=>{ if(window.confirm("Release slot: "+slot+"?")) releaseSlot(sport,adminDate,slot); }}
                                      style={{ padding:"6px 14px", background:"#FEF2F2", border:"1px solid #FECACA", color:"#DC2626", borderRadius:7, cursor:"pointer", fontSize:12, fontWeight:700 }}>
                                      Release
                                    </button>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}

                        {/* All Slots Overview */}
                        <div style={{ marginTop:16 }}>
                          <div className="bb" style={{ fontSize:10, color:"#9CA3AF", letterSpacing:2, marginBottom:8 }}>ALL SLOTS — {(()=>{ const [y,m,d]=adminDate.split("-"); return d+"/"+m+"/"+y; })()}</div>
                          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))", gap:6 }}>
                            {ALL_SLOTS.map(slot=>{
                              const isBlocked = blocked.includes(slot);
                              return (
                                <div key={slot} style={{ padding:"8px 6px", borderRadius:7, textAlign:"center", fontSize:10, fontWeight:600,
                                  background: isBlocked ? "#FEF2F2" : "#DCFCE7",
                                  border: isBlocked ? "1px solid #FECACA" : "1px solid #86EFAC",
                                  color: isBlocked ? "#DC2626" : "#15803D" }}>
                                  {slot.split("–")[0].trim()}
                                  <div style={{ fontSize:9, marginTop:2 }}>{isBlocked?"🔴 Blocked":"🟢 Free"}</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div style={{ marginTop:16, background:"rgba(217,119,6,0.06)", border:"1px solid rgba(217,119,6,0.2)", borderRadius:10, padding:"12px 16px" }}>
                  <p style={{ fontSize:12, color:"#4B5563", lineHeight:1.7 }}>💡 If a payment was not received, click "Release" — the slot will be freed immediately and available for others to book.</p>
                </div>
              </div>
            )}

            {/* ── STATS TAB ── */}
            {tab==="stats" && (
              <div className="fadeIn">
                {/* Time Filter */}
                <div style={{ display:"flex", gap:8, marginBottom:22 }}>
                  {[["day","Today"],["week","This Week"],["month","This Month"],["all","All Time"]].map(([f,l])=>(
                    <button key={f} onClick={()=>setHistFilter(f)}
                      style={{ flex:1, padding:"10px 6px", borderRadius:9, border:"1.5px solid", fontSize:13, fontFamily:"'Bebas Neue',cursive", letterSpacing:1, cursor:"pointer", transition:"all .15s",
                        borderColor:histFilter===f?"#15803D":"#D1FAE5",
                        background:histFilter===f?"#15803D":"#fff",
                        color:histFilter===f?"#fff":"#6B7280" }}>
                      {l}
                    </button>
                  ))}
                </div>

                {/* Big Stats Grid */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))", gap:14, marginBottom:26 }}>
                  {[
                    { icon:"📋", label:"Total Bookings", val:filteredHistory.length, col:"#15803D", bg:"rgba(21,128,61,0.06)", bdr:"rgba(21,128,61,0.18)" },
                    { icon:"💰", label:"Total Revenue", val:"₹"+revenue, col:"#D97706", bg:"rgba(217,119,6,0.06)", bdr:"rgba(217,119,6,0.18)" },
                    { icon:"🏏", label:"Cricket Bookings", val:cricketCount, col:"#15803D", bg:"#F0FDF4", bdr:"#BBF7D0" },
                    { icon:"⚽", label:"Football Bookings", val:footballCount, col:"#7C3AED", bg:"rgba(124,58,237,0.05)", bdr:"rgba(124,58,237,0.18)" },
                    { icon:"⏳", label:"Pending", val:pendingCount, col:"#92400E", bg:"#FFFBEB", bdr:"#FDE68A" },
                    { icon:"✅", label:"Confirmed", val:filteredHistory.filter(b=>(statusMap[b.bookedAt]||b.status)==="Confirmed").length, col:"#15803D", bg:"#F0FDF4", bdr:"#BBF7D0" },
                  ].map(s=>(
                    <div key={s.label} className="stat-card" style={{ background:s.bg, border:"1px solid "+s.bdr, borderRadius:14, padding:"22px 16px" }}>
                      <div style={{ fontSize:30, marginBottom:10 }}>{s.icon}</div>
                      <div className="bb" style={{ fontSize:38, color:s.col, lineHeight:1 }}>{s.val}</div>
                      <div style={{ fontSize:11, color:"#9CA3AF", marginTop:7, letterSpacing:0.5, textTransform:"uppercase", fontWeight:600 }}>{s.label}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", gap:16, marginBottom:16 }}>
                {/* Revenue Breakdown */}
                <div style={{ background:"#fff", border:"1.5px solid #D1FAE5", borderRadius:16, padding:"22px" }}>
                  <div className="bb" style={{ fontSize:13, color:"#15803D", letterSpacing:2.5, marginBottom:16 }}>SPORT-WISE REVENUE</div>
                  {[
                    { sport:"cricket", label:"🏏 Cricket", col:"#15803D", bg:"rgba(21,128,61,0.08)" },
                    { sport:"football", label:"⚽ Football", col:"#D97706", bg:"rgba(217,119,6,0.08)" },
                  ].map(({ sport, label, col, bg })=>{
                    const sportList = filteredHistory.filter(b=>b.sport===sport);
                    const sportRev = getTotalRevenueDisplay(sportList);
                    const pct = revenue > 0 ? Math.round((sportRev/revenue)*100) : 0;
                    return (
                      <div key={sport} style={{ marginBottom:16 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:7 }}>
                          <span style={{ fontSize:13, fontWeight:700, color:"#111827" }}>{label}</span>
                          <span className="bb" style={{ fontSize:20, color:col }}>₹{sportRev} <span style={{ fontSize:11, color:"#9CA3AF" }}>({pct}%)</span></span>
                        </div>
                        <div style={{ height:10, background:"#F0FDF4", borderRadius:6, overflow:"hidden", border:"1px solid #D1FAE5" }}>
                          <div style={{ height:"100%", width:pct+"%", background:col, borderRadius:6, transition:"width .6s ease" }}/>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Recent Activity */}
                <div style={{ background:"#fff", border:"1.5px solid #D1FAE5", borderRadius:16, padding:"22px" }}>
                  <div className="bb" style={{ fontSize:13, color:"#15803D", letterSpacing:2.5, marginBottom:16 }}>RECENT ACTIVITY</div>
                  {history.length===0 ? (
                    <div style={{ fontSize:13, color:"#9CA3AF", textAlign:"center", padding:"24px" }}>
                      <div style={{ fontSize:32, marginBottom:8 }}>📭</div>
                      No bookings yet
                    </div>
                  ) : (
                    <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
                      {[...history].reverse().slice(0,10).map((b,i)=>{
                        const amt = getTotalAmount(b);
                        return (
                          <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid #F3F4F6" }}>
                            <div>
                              <span style={{ color:b.sport==="cricket"?"#15803D":"#D97706", fontWeight:700, fontSize:13 }}>
                                {b.sport==="cricket"?"🏏":"⚽"} {b.name}
                              </span>
                              <div style={{ fontSize:11, color:"#9CA3AF", marginTop:2 }}>{b.date} · {b.phone}</div>
                            </div>
                            <div style={{ textAlign:"right" }}>
                              <div className="bb" style={{ fontSize:20, color:"#D97706" }}>₹{amt}</div>
                              <div style={{ fontSize:10, color:"#9CA3AF" }}>{getDuration(b)}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ─── MAIN APP ─── */
function App() {
  const [authed, setAuthed] = useState(false);
  const [config, setConfig] = useState(null);

  const handleLogin = (appConfig) => {
    setConfig(appConfig);
    setAuthed(true);
    sessionStorage.setItem("t28_admin_authed", "1");
  };

  const handleLogout = () => {
    setAuthed(false);
    setConfig(null);
    sessionStorage.removeItem("t28_admin_authed");
  };

  // Session check — agar same session mein already login kiya hai
  useEffect(() => {
    if (sessionStorage.getItem("t28_admin_authed") === "1") {
      try {
        window.db.ref("appConfig").once("value", snap => {
          const cfg = snap.val() || {};
          if (cfg.adminPin) {
            setConfig(cfg);
            setAuthed(true);
          }
        });
      } catch(e) {}
    }
  }, []);

  if (!authed) return <LoginScreen onLogin={handleLogin}/>;
  return <AdminDashboard appConfig={config} onLogout={handleLogout}/>;
}

function startApp() {
  if (window.db) {
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  } else {
    setTimeout(startApp, 50);
  }
}
startApp();
</script>
</body>
</html>
