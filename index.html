<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Turf28 - Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
    }

    .logo {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #00e676;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 40px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #00e676;
      margin: 0 auto 40px;
      border-radius: 2px;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      color: #eee;
      margin-bottom: 15px;
    }

    p {
      font-size: 15px;
      color: #888;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #00e676;
      color: #00e676;
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .dots {
      margin-top: 50px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00e676;
      animation: pulse 1.4s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">TURF28</div>
    <div class="tagline">Premium Turf Experience</div>
    <div class="divider"></div>
    <h2>We'll Be Back Soon</h2>
    <p>Our website is currently under maintenance.<br/>We are working hard to bring you something amazing.</p>
    <div class="badge">🔧 Under Maintenance</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
