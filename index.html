const { useState, useEffect } = React;

const PHONE = "8552893927";
const WHATSAPP = `https://wa.me/91${PHONE}`;

// ✅ SLOT HOLD SYSTEM — VRL style temporary locking
// Har browser session ka ek unique ID hoga
const SESSION_ID = 'sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
const HOLD_DURATION_MS = 5 * 60 * 1000; // 5 minutes hold

// Generate slots 5AM–11PM
const ALL_SLOTS = [];
for (let h = 5; h < 23; h++) {
  const p1 = h < 12 ? "AM" : "PM";
  const d1 = h <= 12 ? h : h - 12;
  const h2 = h + 1;
  const p2 = h2 <= 12 ? (h2 < 12 ? "AM" : "PM") : "PM";
  const d2 = h2 <= 12 ? h2 : h2 - 12;
  ALL_SLOTS.push(`${String(d1).padStart(2,"0")}:00 ${p1} – ${String(d2).padStart(2,"0")}:00 ${p2}`);
}

function formatDate(d) { return d.toISOString().split("T")[0]; }
function isSunday(ds) { return new Date(ds).getDay() === 0; }
function isWeekend(ds) { const d = new Date(ds).getDay(); return d === 0 || d === 6; }
function getDayName(ds) {
  const d = new Date(ds);
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yyyy = d.getFullYear();
  const weekday = d.toLocaleDateString("en-IN", { weekday:"long" });
  return `${weekday}, ${dd}/${mm}/${yyyy}`;
}
function getSlotHour(s) {
  const m = s.match(/^(\d+):00\s(AM|PM)/);
  if (!m) return 5;
  let h = parseInt(m[1]);
  if (m[2]==="PM" && h!==12) h+=12;
  if (m[2]==="AM" && h===12) h=0;
  return h;
}
function getSlotPrice(slot, date) {
  const h = getSlotHour(slot);
  const weekend = isWeekend(date); // Saturday or Sunday
  return h < 17 ? (weekend ? 600 : 500) : (weekend ? 800 : 700);
}

// ✅ FIX: Har slot ka alag price calculate karo — mixed pricing ke liye (e.g. 4PM-6PM on weekend = 600+800=1400)
function calcTotalPrice(slot, date, hours) {
  const startIdx = ALL_SLOTS.indexOf(slot);
  if (startIdx === -1) return getSlotPrice(slot, date) * (hours || 1);
  let total = 0;
  for (let i = 0; i < (hours || 1); i++) {
    const s = ALL_SLOTS[startIdx + i];
    if (s) total += getSlotPrice(s, date);
  }
  return total;
}

// Always compute fresh — never stale even if page is open overnight
function getToday() { return formatDate(new Date()); }
function getMaxDate() { return formatDate(new Date(Date.now() + 30*86400000)); }

function saveHistory(h) {
  // Only save the last entry (newest) using push — avoids overwriting all data

function pushHistoryEntry(entry) {

function AdminSlotPanel({bookedFor, releaseSlot, history, getDayName, getSlotPrice, setAdminOpen, setAdminAuth, setAdminPin, TODAY}) {
  const [adminTab, setAdminTab] = React.useState("bookings");
  const [adminDate, setAdminDate] = React.useState(getToday());
  const [histFilter, setHistFilter] = React.useState("day");
  const [sportFilter, setSportFilter] = React.useState("all");
  const [expandedCard, setExpandedCard] = React.useState(null);
  const [statusMap, setStatusMap] = React.useState({});
  const [searchQuery, setSearchQuery] = React.useState("");

  const filterHistory = () => {
    const now = new Date();
    return history.filter(b => {
      const d = new Date(b.date);
      let passTime = true;
      if (histFilter==="day") passTime = b.date===getToday();
      else if (histFilter==="week") { const wa=new Date(now); wa.setDate(now.getDate()-7); passTime = d>=wa; }
      else if (histFilter==="month") passTime = d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      let passSport = sportFilter==="all" || b.sport===sportFilter;
      let passSearch = !searchQuery || b.name?.toLowerCase().includes(searchQuery.toLowerCase()) || b.phone?.includes(searchQuery);
      return passTime && passSport && passSearch;
    });
  };

  const filteredHistory = filterHistory();
  const totalRevenue = filteredHistory.reduce((sum,b)=>sum+(Number(b.amount)||0),0);
  const cricketCount = filteredHistory.filter(b=>b.sport==="cricket").length;
  const footballCount = filteredHistory.filter(b=>b.sport==="football").length;
  const pendingCount = filteredHistory.filter(b=>(statusMap[b.bookedAt]||b.status)==="Pending Confirmation").length;

  const getStatus = (b) => statusMap[b.bookedAt] || b.status || "Pending Confirmation";
  const statusColors = {
    "Pending Confirmation": { bg:"#FEF9C3", border:"#FDE047", bdr:"#FDE047", text:"#854D0E" },
    "Confirmed":            { bg:"#DCFCE7", border:"#86EFAC", bdr:"#86EFAC", text:"#15803D" },
    "Paid":                 { bg:"#DCFCE7", border:"#86EFAC", bdr:"#86EFAC", text:"#15803D" },
    "Cancelled":            { bg:"#FEE2E2", border:"#FECACA", bdr:"#FECACA", text:"#DC2626" },
    "Completed":            { bg:"#DBEAFE", border:"#93C5FD", bdr:"#93C5FD", text:"#1D4ED8" },
    "Free (Coupon)":        { bg:"#F3E8FF", border:"#C084FC", bdr:"#C084FC", text:"#7C3AED" },
  };

  const getDuration = (b) => {
    if (b.hours) return b.hours + " hr" + (b.hours > 1 ? "s" : "");
    if (b.selectedSlots && b.selectedSlots.length) return b.selectedSlots.length + " hr" + (b.selectedSlots.length > 1 ? "s" : "");
    return "1 hr";
  };

  const getTotalAmount = (b) => {
    if (b.status === "Free (Coupon)") return 0;
    if (b.amount) return b.amount; // Firebase mein save hua actual amount use karo
    if (b.hours && b.slot && b.date) return calcTotalPrice(b.slot, b.date, b.hours);
    return 0;
  };

  const getEndTime = (b) => {
    if (b.selectedSlots && b.selectedSlots.length > 0) {
      return b.selectedSlots[b.selectedSlots.length-1]?.split("–")[1]?.trim() || "";
    }
    return b.slot?.split("–")[1]?.trim() || "";
  };

  const getStartTime = (b) => b.slot?.split("–")[0]?.trim() || b.slot || "";

  // ✅ FIX Bug 6: Admin status Firebase mein save karo — panel band/khulne par status preserve hoga
  const updateBookingStatus = (bookedAt, newStatus) => {
    setStatusMap(prev => ({ ...prev, [bookedAt]: newStatus }));
    window.db.ref("bookingHistory").once("value", snap => {
      const data = snap.val();

      Object.entries(data).forEach(([key, val]) => {

          window.db.ref("bookingHistory/" + key + "/status").set(newStatus, err => {
            if (err) console.warn("❌ Status update failed:", err);
            else console.log("✅ Status updated in Firebase:", newStatus);
          });
        }

  return (
    <div>
      {/* Header */}

        <div style={{ display:"flex",alignItems:"center",gap:8 }}>

          <div className="bb" style={{ fontSize:22,color:"#15803D" }}>ADMIN PANEL</div>
        </div>
        <button onClick={()=>{setAdminOpen(false);setAdminAuth(false);setAdminPin("");}}

      </div>

      <div style={{ display:"flex",gap:6,marginBottom:18 }}>
        {[["bookings","📋 Bookings"],["slots","🔒 Slots"],["stats","📊 Stats"]].map(([t,l])=>(
          <button key={t} onClick={()=>setAdminTab(t)}

      {/* ── BOOKINGS TAB ── */}

          <div style={{ marginBottom:10 }}>

          <div style={{ display:"flex",gap:5,marginBottom:14 }}>

                        {/* Action Buttons */}
                        <div style={{ display:"flex",gap:6 }}>
                          <a href={"https://wa.me/91"+b.phone} target="_blank" rel="noopener noreferrer"

                            <CALL_ICON/> Call
                          </a>
                          <button onClick={()=>{ if(window.confirm("Release this slot?")){releaseSlot(b.sport,b.date,b.slot);setExpandedCard(null);}}}
                            style={{ flex:1,padding:"8px",background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA",borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:700 }}>
                            🗑️ Release
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── SLOTS TAB ── */}
      {adminTab==="slots" && (
        <div>
          <div style={{ marginBottom:14 }}>
            <label className="lbl">Select Date</label>
            <div style={{ position:"relative", display:"inline-block" }}>
              <div style={{ background:"#F9FAFB", border:"1.5px solid #BBF7D0", borderRadius:8, padding:"11px 16px", minWidth:170, display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:15, color:"#15803D", fontWeight:700, fontFamily:"monospace" }}>
                  {(()=>{ const [y,m,d]=adminDate.split("-"); return d+"/"+m+"/"+y; })()}
                </span>
                <span>📅</span>
              </div>
              <input type="date" value={adminDate} onChange={e=>setAdminDate(e.target.value)}
                style={{ position:"absolute", inset:0, opacity:0, cursor:"pointer", width:"100%", height:"100%" }}/>
            </div>
          </div>
          {["cricket","football"].map(sport=>{
            const blocked=bookedFor(sport,adminDate);
            return (
              <div key={sport} style={{ marginBottom:16 }}>
                <div className="bb" style={{ fontSize:15,color:sport==="cricket"?"#15803D":"#D97706",marginBottom:8 }}>

                  <div style={{ fontSize:12,color:"#6B7280",padding:"10px",background:"#F9FAFB",borderRadius:8,textAlign:"center" }}>No blocked slots</div>

                  <div style={{ display:"flex",flexDirection:"column",gap:7 }}>
                    {blocked.map(slot=>{
                      const booking_match = history.find(h=>h.sport===sport&&h.date===adminDate&&h.slot===slot);
                      return (
                        <div key={slot} style={{ background:"#F9FAFB",border:"1px solid #BBF7D0",borderRadius:8,padding:"10px 12px" }}>
                          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                            <div>
                              <div style={{ fontSize:13,color:"#111827",fontWeight:700 }}>⏰ {slot}</div>
                              <div style={{ fontSize:10,color:"#D97706",marginTop:1 }}>₹{getSlotPrice(slot,adminDate)}</div>
                              {booking_match && (
                                <div style={{ fontSize:10,color:"#6B7280",marginTop:3 }}>

                            <button onClick={()=>{ if(window.confirm("Release slot "+slot+"?")) releaseSlot(sport,adminDate,slot); }}

                              Release

          <div style={{ background:"rgba(217,119,6,0.06)",border:"1px solid rgba(217,119,6,0.2)",borderRadius:8,padding:"10px 14px" }}>
            <p style={{ fontSize:11,color:"#4B5563",lineHeight:1.6 }}>💡 Release a slot if payment was not received. Slot becomes available immediately.</p>
          </div>
        </div>
      )}

      {/* ── STATS TAB ── */}
      {adminTab==="stats" && (
        <div>
          <div style={{ display:"flex",gap:6,marginBottom:14 }}>
            {[["day","Today"],["week","Week"],["month","Month"],["all","All Time"]].map(([f,l])=>(
              <button key={f} onClick={()=>setHistFilter(f)}
                style={{ flex:1,padding:"7px 2px",borderRadius:7,border:"1.5px solid",fontSize:10,fontWeight:700,cursor:"pointer",
                  borderColor:histFilter===f?"#15803D":"#BBF7D0",background:histFilter===f?"rgba(21,128,61,0.08)":"#F9FAFB",color:histFilter===f?"#15803D":"#6B7280" }}>
                {l}
              </button>
            ))}
          </div>

          {/* Big Stats */}
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14 }}>
            {[
              { icon:"📋", label:"Total Bookings", val:filteredHistory.length, col:"#15803D", bg:"rgba(21,128,61,0.06)", bdr:"rgba(21,128,61,0.2)" },
              { icon:"💰", label:"Total Revenue", val:"₹"+getTotalRevenueDisplay(filteredHistory,getSlotPrice), col:"#D97706", bg:"rgba(217,119,6,0.06)", bdr:"rgba(217,119,6,0.2)" },
              { icon:"🏏", label:"Cricket Bookings", val:cricketCount, col:"#15803D", bg:"rgba(21,128,61,0.06)", bdr:"rgba(21,128,61,0.2)" },
              { icon:"⚽", label:"Football Bookings", val:footballCount, col:"#7C3AED", bg:"rgba(124,58,237,0.06)", bdr:"rgba(124,58,237,0.2)" },

function getTotalRevenueDisplay(list, getSlotPrice) {
  return list.reduce((sum,b)=>{
    if (b.status === "Free (Coupon)") return sum;
    if (b.amount) return sum + Number(b.amount);
    if (b.hours && b.slot && b.date) return sum + calcTotalPrice(b.slot,b.date,b.hours);
    return sum;
  },0);
}

function App() {
  const [page, setPage] = useState("home");
  const [bookings, setBookings] = useState(loadBookings);
  const [history, setHistory] = useState(loadHistory);
  const [booking, setBooking] = useState({ sport:null, date:getToday(), slot:null, hours:1 });
  // ✅ FIX Bug 3: Har minute auto-refresh — aaj ke past slots automatically filter ho jaate hain
  const [_tick, setTick] = useState(0);
  const [form, setForm] = useState({ name:"", phone:"", players:"", email:"", coupon:"" });
  const [couponStatus, setCouponStatus] = useState(null);
  // Admin PIN and Coupon are loaded from Firebase "appConfig" node — never hardcoded here.
  // To update: Firebase Console > Realtime Database > appConfig > adminPin / ownerCoupon
  const [appConfig, setAppConfig] = useState({ adminPin: null, ownerCoupon: null });
  const [errors, setErrors] = useState({});
  const [step, setStep] = useState(1);
  const [confirmed, setConfirmed] = useState(null);
  const [adminOpen, setAdminOpen] = useState(false);
  const [adminPin, setAdminPin] = useState("");
  const [adminAuth, setAdminAuth] = useState(false);
  const [adminPinError, setAdminPinError] = useState(false);
  const [fbLoading, setFbLoading] = useState(true);
  // ✅ SLOT HOLD SYSTEM
  const [holds, setHolds] = useState({}); // { date: { s0: {sessionId, expiresAt}, ... } }
  const [holdSecondsLeft, setHoldSecondsLeft] = useState(null); // countdown timer

  useEffect(() => {
    // Clear localStorage on every load — Firebase is the only source of truth
    try { localStorage.removeItem("turf28_bookings"); } catch(e) {}
    try { localStorage.removeItem("turf28_history"); } catch(e) {}

    // Load admin config from Firebase only — no credentials stored in source code
    try {
      window.db.ref("appConfig").once("value", snap => {
        const cfg = snap.val() || {};
        setAppConfig({ adminPin: cfg.adminPin || null, ownerCoupon: cfg.ownerCoupon || null });
      });
    } catch(e) { console.warn("Config load error:", e); }

    const timeout = setTimeout(() => setFbLoading(false), 5000);
    let bRef, hRef;
    try {
      bRef = window.db.ref("bookedSlots");
      bRef.on("value", snap => {
        clearTimeout(timeout);
        // ✅ FIX Bug 4 (Merge Logic): Firebase hi single source of truth hai.
        // Pehle wala merge local+FB slots karta tha jo released slots ko wapas le aata tha.
        // Ab pre-block Firebase write ke andar hota hai, isliye merge ki zarurat nahi.
        const data = snap.val() || {};
        setBookings(data);
        setFbLoading(false);
      }, err => { console.warn("FB err:", err); setFbLoading(false); });

      hRef = window.db.ref("bookingHistory");
      hRef.on("value", snap => {
        const data = snap.val();
        if (data) {
          const arr = Array.isArray(data) ? data : Object.values(data);
          setHistory(arr);
        } else {
          setHistory([]);
        }
      }, err => console.warn("FB history err:", err));

      // ✅ SLOT HOLD SYSTEM — slotHolds listener
      const holdsRef = window.db.ref("slotHolds");
      holdsRef.on("value", snap => {
        setHolds(snap.val() || {});
      }, err => console.warn("FB holds err:", err));
    } catch(e) {
      console.warn("FB init err:", e);
      clearTimeout(timeout);
      setFbLoading(false);

        <section style={{ padding:"0", background:"#F0FDF4", display:"flex", minHeight:320, overflow:"hidden" }}>

            onClick={()=>goBook("cricket")}>

            <div style={{ position:"absolute", inset:0, background:"linear-gradient(180deg,#0a1f0a 0%,#1a4a1a 40%,#0f3a0f 100%)" }}/>
            {/* Field lines */}
            <div style={{ position:"absolute", inset:0, background:"repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(255,255,255,0.04) 48px,rgba(255,255,255,0.04) 50px),repeating-linear-gradient(0deg,transparent,transparent 48px,rgba(255,255,255,0.04) 48px,rgba(255,255,255,0.04) 50px)" }}/>

            <div style={{ position:"absolute", top:"35%", left:"50%", transform:"translateX(-50%)", width:80, height:2, background:"rgba(255,255,255,0.3)" }}/>
            <div style={{ position:"absolute", top:"65%", left:"50%", transform:"translateX(-50%)", width:80, height:2, background:"rgba(255,255,255,0.3)" }}/>

            {/* Stumps */}
            {[0,8,16].map(offset=>(
              <div key={offset} style={{ position:"absolute", top:"28%", left:`calc(50% + ${offset-8}px)`, width:3, height:40, background:"rgba(255,255,255,0.7)", borderRadius:2 }}/>
            ))}
            {[0,8,16].map(offset=>(
              <div key={offset} style={{ position:"absolute", top:"60%", left:`calc(50% + ${offset-8}px)`, width:3, height:40, background:"rgba(255,255,255,0.7)", borderRadius:2 }}/>
            ))}

                        const total = pr * booking.hours;

            )}
          </div>
        </div>
      )}

    </div>
  );
}

// Wait for Firebase db to be ready before rendering
function startApp() {
  if (window.db) {
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  } else {
    setTimeout(startApp, 50);
  }
}
startApp();
</script>
</body>
</html>
